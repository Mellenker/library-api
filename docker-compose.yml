services:
  postgres:
    image: postgres:16
    restart: always
    container_name: library_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  postgres_test:
    image: postgres:16
    restart: always
    container_name: library_db_test
    env_file:
      - .env
    environment:
      POSTGRES_DB: librarydb_test
    ports:
      - "5433:5432"

volumes:
  db-data: